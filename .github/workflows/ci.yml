name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.12' ]

    services:
      postgres:
        image: postgres:15-alpine
        ports: [ '5432:5432' ]
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_attendence
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt || true

      # Service containers use health checks; no additional wait needed.

      - name: Lint and type-check (backend)
        working-directory: backend
        run: |
          flake8 app || true
          black --check app || true
          isort --check-only app || true
          mypy --config-file mypy.ini || true

      - name: Run backend tests
        working-directory: backend
        env:
          CI: 'true'
          GITHUB_ACTIONS: 'true'
          TESTING: 'true'
          DEBUG: 'false'
          SECRET_KEY: test-ci-key
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_PORT: '5432'
          TEST_DB_USER: postgres
          TEST_DB_PASSWORD: postgres
          TEST_DB_NAME: test_attendence
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/test_attendence
        run: |
          pytest -q tests -k "not perf" --tb=short --maxfail=10 --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN || '' }}
          files: backend/coverage.xml
          fail_ci_if_error: false

  frontend:
    name: Frontend Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: [ '20' ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps and run unit tests (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm run type-check
          npm run lint --if-present
          npm run test:unit -- --run --coverage

      # 已废弃 frontend-new，相关步骤移除
