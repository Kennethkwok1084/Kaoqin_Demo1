# CI/CD集成冒烟测试配置
# 用于在CI/CD流水线中执行端到端冒烟测试

name: E2E Smoke Test

on:
  workflow_call:
    inputs:
      environment:
        description: 'Test environment'
        required: true
        type: string
        default: 'staging'
      api_base_url:
        description: 'API base URL'
        required: false
        type: string
        default: 'http://localhost:8000'
      frontend_url:
        description: 'Frontend URL'
        required: false
        type: string
        default: 'http://localhost'

jobs:
  smoke-test:
    name: Run E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install smoke test dependencies
      run: |
        pip install -r scripts/requirements-smoke.txt

    - name: Wait for services to be ready
      run: |
        # 等待服务启动
        timeout 300 bash -c 'while ! curl -f -s ${{ inputs.api_base_url }}/health; do sleep 5; done'
        echo "Services are ready"

    - name: Run quick smoke test
      run: |
        chmod +x scripts/quick_smoke.sh
        ./scripts/quick_smoke.sh \
          --api-url ${{ inputs.api_base_url }} \
          --frontend-url ${{ inputs.frontend_url }} \
          --max-retries 30

    - name: Run comprehensive smoke test
      if: inputs.environment == 'production'
      run: |
        python scripts/e2e_smoke.py \
          --environment ${{ inputs.environment }} \
          --no-start-services \
          --verbose

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: smoke-test-results-${{ inputs.environment }}
        path: |
          e2e_smoke_test.log
          /tmp/frontend_response.html
        retention-days: 7

  notify-results:
    name: Notify Test Results
    runs-on: ubuntu-latest
    needs: smoke-test
    if: always()
    
    steps:
    - name: Notify on success
      if: needs.smoke-test.result == 'success'
      run: |
        echo "✅ E2E smoke tests passed for ${{ inputs.environment }}"
        # 这里可以添加成功通知逻辑，如Slack、Teams等
    
    - name: Notify on failure
      if: needs.smoke-test.result == 'failure'
      run: |
        echo "❌ E2E smoke tests failed for ${{ inputs.environment }}"
        # 这里可以添加失败通知逻辑，如Slack、Teams等