# 覆盖率测试配置文件

# 基础测试配置
[basic]
test_files = [
    "tests/unit/test_simple_coverage.py",
    "tests/unit/test_helpers.py"
]
exclude_files = [
    "tests/unit/test_coverage_improvement_strategy.py",
    "tests/e2e/test_repair_task_lifecycle.py"
]

# 单元测试配置
[unit]
test_path = "tests/unit/"
exclude_files = [
    "tests/unit/test_coverage_improvement_strategy.py"
]

# 集成测试配置
[integration] 
test_path = "tests/integration/"
exclude_files = []

# 完整测试配置
[all]
test_path = "tests/"
exclude_files = [
    "tests/unit/test_coverage_improvement_strategy.py",
    "tests/e2e/test_repair_task_lifecycle.py"
]

# 输出格式配置
[formats]
html = true
xml = true 
json = true
term = true

# 覆盖率目标
[targets]
minimum_coverage = 80.0
warning_coverage = 60.0
excellent_coverage = 95.0
