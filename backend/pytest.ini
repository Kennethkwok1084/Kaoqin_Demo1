[pytest]
# pytest配置文件

# 测试发现配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记配置
markers =
    integration: 集成测试
    unit: 单元测试
    slow: 慢测试
    auth: 认证相关测试
    database: 数据库相关测试
    api: API测试
    cache: 缓存相关测试
    import: 数据导入相关测试
    timeout: 超时测试标记

# 输出配置
addopts = --strict-markers --verbose --tb=short --show-capture=no --disable-warnings -ra -p pytest_plugin

# 异步测试配置
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
async_test_timeout = 60

# 最小版本要求
minversion = 6.0

# 测试路径过滤
norecursedirs = .git .tox dist build *.egg __pycache__ .pytest_cache

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 警告过滤
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:sqlalchemy.*