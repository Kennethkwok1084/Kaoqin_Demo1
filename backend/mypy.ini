[mypy]
# Global options
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True

exclude = (?x)(
    ^scripts/.*\.py$
    | ^test_.*\.py$
    | .*_test\.py$
    | ^.*migration.*\.py$
    | ^tests/.*\.py$
    | test_.*\.py$
    )

# SQLAlchemy plugin
plugins = sqlalchemy.ext.mypy.plugin

# Per-module options
[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-alembic.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True

[mypy-passlib.*]
ignore_missing_imports = True

[mypy-bcrypt.*]
ignore_missing_imports = True

[mypy-jose.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = False

[mypy-pydantic.*]
ignore_missing_imports = False

[mypy-celery.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

# Celery tasks - allow untyped decorators
[mypy-app.core.celery_tasks]
disallow_untyped_decorators = False

# Test files can be less strict
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
ignore_errors = True

# Scripts directory can be less strict
[mypy-scripts.*]
disallow_untyped_defs = False
ignore_errors = True

[mypy-scripts.type_check]
ignore_errors = True

[mypy-scripts.fix_mypy_errors]
ignore_errors = True

# Standalone scripts can be less strict
[mypy-*.py]
disallow_untyped_defs = False
warn_return_any = False