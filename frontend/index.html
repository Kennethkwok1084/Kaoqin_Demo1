<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="考勤管理系统 - 专为高校网络维护团队设计的现代化考勤管理解决方案" />
    <meta name="keywords" content="考勤管理,高校,网络维护,Vue3,TypeScript" />
    <meta name="author" content="Kaoqin Team" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#409EFF" />
    <meta name="msapplication-TileColor" content="#409EFF" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="考勤管理系统" />
    
    <title>考勤管理系统</title>
  </head>
  <body>
    <div id="app">
      <!-- 应用加载时的占位内容 -->
      <div id="initial-loader" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      ">
        <div style="
          width: 40px;
          height: 40px;
          border: 3px solid #f3f3f3;
          border-top: 3px solid #409EFF;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 16px;
        "></div>
        <div style="
          font-size: 16px;
          color: #666;
          font-family: 'Microsoft YaHei', Arial, sans-serif;
        ">考勤管理系统加载中...</div>
      </div>
    </div>
    
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      body {
        margin: 0;
        padding: 0;
        font-family: 'Microsoft YaHei', Arial, sans-serif;
      }
      
      #initial-loader {
        font-family: inherit;
      }
    </style>
    
    <script type="module" src="/src/main.ts"></script>
    
    <!-- 移除初始加载器 -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s ease';
            setTimeout(function() {
              loader.remove();
            }, 300);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
