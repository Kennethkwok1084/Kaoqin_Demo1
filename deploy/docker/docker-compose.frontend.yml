version: '3.8'

services:
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VERSION: ${FRONTEND_VERSION:-local}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-考勤管理系统}
    container_name: kaoqin-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
